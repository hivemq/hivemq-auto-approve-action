# Example caller for an OS extension repo: .github/workflows/auto-approve.yml
# Copy into each consuming repo and adjust allowed-paths / allowed-lines.
name: Auto-approve Release PRs

on:
  pull_request:
    types: ['opened', 'reopened', 'edited', 'synchronize']
    branches:
      - master

concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# No default GITHUB_TOKEN permissions: the action uses the passed github-token.
permissions: {}

jobs:
  auto-approve:
    name: Evaluate auto-approve eligibility
    runs-on: ubuntu-latest
    # Fork PRs do not receive secrets; the status job treats "skipped" as pass.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: hivemq/hivemq-auto-approve-action@v1
        with:
          allowed-team: hivemq-team-pd
          # Every changed file must match one of these (JS regex).
          allowed-paths: |
            ^gradle\.properties$
          # Every added/removed line must match one of these (JS regex).
          allowed-lines: |
            ^version=[0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT|-beta)?$
          github-token: ${{ secrets.JENKINS_GITHUB_TOKEN }}
          reviewer-login: ${{ secrets.JENKINS_GITHUB_USERNAME }}

  # Kept in the caller so the required status-check name stays stable across repos
  # and a skipped fork PR still reports success to branch protection.
  status:
    name: Auto-approve Release PRs
    needs: [auto-approve]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify auto-approve job result
        run: |
          result="${{ needs.auto-approve.result }}"
          echo "auto-approve job result: $result"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            exit 0
          fi
          exit 1
