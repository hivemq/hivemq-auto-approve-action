name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Verify dist/ at this tag is fresh
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ at this tag is stale. Rebuild (npm run build), commit, and re-tag."
            git diff --stat -- dist
            exit 1
          fi
          echo "dist/ matches a fresh build."

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3

      - name: Update major tag
        uses: cssnr/update-version-tags-action@dc7077eaec04b8fd61f7b7e6d4830564cfd12382 # v2
        with:
          minor: false
