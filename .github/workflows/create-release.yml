name: Create release

# Manual release driver: builds the bundle, commits dist/ and the tag to main,
# then lets release.yml (triggered by the tag push) publish the GitHub release
# and move the major tag.
#
# Auth: mints a short-lived token from the HiveMQ GitHub App (#2892625) via
# GH_ACTIONS_REPO_ACCESS_TOKENS_PRIVATE_KEY. That App must:
#   (a) have contents: write on this repo,
#   (b) be a bypass actor on the `main` ruleset (so it can push without a PR).
# The App token is not the default GITHUB_TOKEN, so pushing the tag triggers release.yml.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v, e.g. 1.2.3'
        required: true
        type: string

permissions:
  contents: read # write/bypass rights come from RELEASE_TOKEN, not GITHUB_TOKEN

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version must be X.Y.Z with no leading v (got '$VERSION')"
            exit 1
          fi

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: 2892625
          private-key: ${{ secrets.GH_ACTIONS_REPO_ACCESS_TOKENS_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Ensure tag is unused
        env:
          TAG: v${{ inputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null \
             || git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "::error::tag $TAG already exists"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Commit dist and push tag
        env:
          TAG: v${{ inputs.version }}
          ACTOR: ${{ github.actor }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "${ACTOR}@users.noreply.github.com"
          git add dist
          # --allow-empty: a release with no bundle change still gets a marker commit.
          git commit -m "Release $TAG" --allow-empty
          git tag "$TAG"
          git push origin HEAD:main
          git push origin "$TAG"
          echo "Pushed $TAG; release.yml will publish the release and move the major tag."
